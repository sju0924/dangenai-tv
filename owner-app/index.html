<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>당그나이TV — 사장님 알림 설정</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    h1 { font-size: 24px; color: #1a202c; margin-bottom: 8px; }
    .subtitle { color: #718096; font-size: 14px; margin-bottom: 32px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #667eea; }
    button {
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #5a67d8; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status.success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    .status.error   { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .status.info    { background: #ebf8ff; color: #2b6cb0; border: 1px solid #90cdf4; }
    .token-box {
      margin-top: 16px;
      padding: 12px;
      background: #f7fafc;
      border-radius: 8px;
      font-size: 11px;
      font-family: monospace;
      word-break: break-all;
      color: #4a5568;
      display: none;
    }
    .step { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; color: #4a5568; font-size: 14px; }
    .step-num {
      width: 28px; height: 28px;
      background: #667eea;
      color: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🔔 사장님 알림 설정</h1>
  <p class="subtitle">TV에서 주문이 들어오면 이 기기로 알림을 받습니다</p>

  <div style="margin-bottom: 28px;">
    <div class="step"><div class="step-num">1</div> 아래 가게 ID를 확인하세요</div>
    <div class="step"><div class="step-num">2</div> "알림 허용" 버튼을 클릭하세요</div>
    <div class="step"><div class="step-num">3</div> 브라우저 알림 권한을 허용하세요</div>
  </div>

  <label>가게 ID</label>
  <input type="text" id="storeId" value="store_demo" placeholder="store_demo" />

  <button id="btn" onclick="registerToken()">🔔 알림 허용 및 토큰 등록</button>

  <div class="status" id="status"></div>
  <div class="token-box" id="tokenBox"></div>
</div>

<!-- Firebase SDK (compat version for simplicity) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
<!-- 민감 정보는 config.js에서 관리 (git-ignored) -->
<script src="config.js"></script>

<script>
  const { FIREBASE_API_KEY, FIREBASE_APP_ID, VAPID_KEY, SKILL_ENGINE_URL } = window.ENV;

  const firebaseConfig = {
    apiKey:            FIREBASE_API_KEY,
    authDomain:        "project-9ed97ef0-254a-4ec3-975.firebaseapp.com",
    projectId:         "project-9ed97ef0-254a-4ec3-975",
    storageBucket:     "project-9ed97ef0-254a-4ec3-975.firebasestorage.app",
    messagingSenderId: "792333060863",
    appId:             FIREBASE_APP_ID,
    measurementId:     "G-LWLRRW1NX0",
  };

  firebase.initializeApp(firebaseConfig);
  const messaging = firebase.messaging();

  function showStatus(msg, type) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status " + type;
    el.style.display = "block";
  }

  async function registerToken() {
    const btn = document.getElementById("btn");
    const storeId = document.getElementById("storeId").value.trim();
    if (!storeId) { showStatus("가게 ID를 입력하세요", "error"); return; }

    btn.disabled = true;
    btn.textContent = "처리 중...";

    try {
      showStatus("브라우저 알림 권한을 요청 중입니다...", "info");

      const permission = await Notification.requestPermission();
      if (permission !== "granted") {
        showStatus("알림 권한이 거부되었습니다. 브라우저 설정에서 허용해주세요.", "error");
        btn.disabled = false; btn.textContent = "🔔 알림 허용 및 토큰 등록";
        return;
      }

      showStatus("FCM 토큰 발급 중...", "info");
      const token = await messaging.getToken({ vapidKey: VAPID_KEY });

      document.getElementById("tokenBox").textContent = "FCM 토큰: " + token;
      document.getElementById("tokenBox").style.display = "block";

      // skill-engine에 토큰 저장 요청
      showStatus("Firestore에 토큰 저장 중...", "info");
      const res = await fetch(`${SKILL_ENGINE_URL}/register-fcm-token`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ store_id: storeId, fcm_token: token }),
      });

      if (!res.ok) throw new Error(`서버 응답 오류: ${res.status}`);

      showStatus("✅ 완료! 이 기기로 주문 알림이 전송됩니다.", "success");
      btn.textContent = "✅ 등록 완료";
    } catch (err) {
      showStatus("오류: " + err.message, "error");
      btn.disabled = false; btn.textContent = "🔔 알림 허용 및 토큰 등록";
    }
  }
</script>
</body>
</html>
